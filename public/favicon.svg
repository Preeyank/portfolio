<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Grid pattern matching the hero background -->
    <pattern id="grid" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0b0c0e"/>

  <!-- Grid overlay -->
  <rect width="32" height="32" rx="6" fill="url(#grid)"/>

  <!-- Subtle top glow -->
  <ellipse cx="16" cy="0" rx="14" ry="8" fill="rgba(124,158,247,0.12)"/>

  <!-- P monogram — DM Serif style, hand-crafted paths -->
  <!-- Vertical stem -->
  <rect x="9" y="8" width="2.2" height="16" rx="0.5" fill="rgba(255,255,255,0.92)"/>
  <!-- Bowl top horizontal -->
  <rect x="9" y="8" width="9" height="2" rx="0.5" fill="rgba(255,255,255,0.92)"/>
  <!-- Bowl bottom horizontal -->
  <rect x="9" y="16" width="8" height="2" rx="0.5" fill="rgba(255,255,255,0.92)"/>
  <!-- Bowl right vertical -->
  <rect x="16" y="8" width="2" height="10" rx="0.5" fill="rgba(255,255,255,0.92)"/>

  <!-- Accent dot — matches custom cursor color -->
  <circle cx="23" cy="23" r="2" fill="rgba(124,158,247,0.9)"/>
  <circle cx="23" cy="23" r="3.5" fill="rgba(124,158,247,0.12)"/>
</svg>
