<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.032)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="rgba(100,140,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(100,140,255,0)"/>
    </radialGradient>
    <radialGradient id="fade" cx="50%" cy="100%" r="55%">
      <stop offset="55%" stop-color="#0b0c0e"/>
      <stop offset="100%" stop-color="rgba(11,12,14,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0b0c0e"/>

  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Bottom fade -->
  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- Left accent line -->
  <rect x="80" y="180" width="1" height="270" fill="rgba(124,158,247,0.25)"/>

  <!-- Eyebrow label -->
  <text x="104" y="210" font-family="monospace" font-size="13" font-weight="400" letter-spacing="3" fill="rgba(124,158,247,0.7)" text-transform="uppercase">FULL STACK ENGINEER</text>

  <!-- Name -->
  <text x="100" y="330" font-family="Georgia, serif" font-size="96" font-weight="400" fill="rgba(255,255,255,0.95)" letter-spacing="-2">Priyank</text>
  <text x="100" y="420" font-family="Georgia, serif" font-size="96" font-weight="400" font-style="italic" fill="rgba(255,255,255,0.40)" letter-spacing="-2">Bardolia</text>

  <!-- Divider -->
  <rect x="100" y="460" width="60" height="1" fill="rgba(124,158,247,0.35)"/>

  <!-- Tagline -->
  <text x="100" y="500" font-family="monospace" font-size="15" fill="rgba(255,255,255,0.35)" letter-spacing="1">Seattle, WA · GE Healthcare · API Sentinel</text>

  <!-- Accent dot (matches cursor) -->
  <circle cx="1100" cy="540" r="6" fill="rgba(124,158,247,0.9)"/>
  <circle cx="1100" cy="540" r="14" fill="rgba(124,158,247,0.1)"/>

  <!-- Domain -->
  <text x="1120" y="545" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.2)" text-anchor="start">preeyank.dev</text>
</svg>
